name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Run in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          imageName: svsch-ci
          push: never
          runCmd: |
            # UHDM is already installed in /usr/local in the dev container,
            # but its CMake config points to /opt/uhdm. Fix it locally.
            sudo mkdir -p /opt && sudo ln -s /usr/local /opt/uhdm
            
            npm ci
            npx playwright install --with-deps chromium
            npm run lint
            npm run compile
            npm run test:backend
            npm test
            npm run test:visual
            npm run test:bdd
            npm audit --audit-level=high

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            test-results/visual/**
            playwright-report/**
            test/visual/__screenshots__/**

      - name: Upload BDD Documentation and Visual Diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-documentation-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            test-results/bdd/**
            test/features/snapshots/**

      - name: Run npm audit
        run: npm audit --audit-level=high
