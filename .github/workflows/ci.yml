name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run Playwright tests
        run: npm run test:visual

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run compile
        run: npm run compile